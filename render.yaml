services:
  # Backend API Web Service
  - type: web
    name: ssc-backend
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: PORT
        value: 5000
      - key: MONGODB_URI
        sync: false # Set manually on Render dashboard to connect to your MongoDB database

  # Frontend React/Vite Static Site
  - type: web
    name: ssc-frontend
    runtime: static
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: ssc-backend
          envVarKey: RENDER_EXTERNAL_URL

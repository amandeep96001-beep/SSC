services:
  # Backend API — deployed on Render
  - type: web
    name: ssc-backend
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: PORT
        value: 5000
      - key: MONGODB_URI
        sync: false
      # Optional: your Vercel frontend URL for tighter CORS (e.g. https://your-app.vercel.app)
      - key: FRONTEND_URL
        sync: false
